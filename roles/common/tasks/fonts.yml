---
- name: install fontconfig
  become: yes
  package:
    name: fontconfig
    state: present

- name: create user font directory
  file: "path={{ ansible_facts['env']['HOME'] }}/.fonts state=directory"

- name: install inconsolata
  become: yes
  package:
    name: "{{ inconsolata_package_name }}"
    state: present

- name: install inconsolata nerd
  become: yes
  package:
    name: ttf-inconsolata-nerd
    state: present
  when: ansible_facts['os_family'] == 'Archlinux'

- name: install inconsolata powerline
  get_url:
    url: https://github.com/powerline/fonts/raw/master/Inconsolata/Inconsolata%20for%20Powerline.otf
    dest: "{{ ansible_facts['env']['HOME'] }}/.fonts/inconsolata-powerline.otf"
  notify:
    - rebuild font cache
