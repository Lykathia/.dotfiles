---
- name: install base shell tools
  become: true
  package:
    name: "{{ packages_common }}"
    state: present
    update_cache: true

- name: symlink batcat to bat (Debian/Ubuntu)
  become: true
  file:
    src: /usr/bin/batcat
    dest: /usr/bin/bat
    state: link
  when: ansible_facts['os_family'] == 'Debian'

- name: install fzf from GitHub release (Debian/Ubuntu)
  become: true
  ansible.builtin.unarchive:
    src: "https://github.com/junegunn/fzf/releases/download/v{{ fzf_version }}/fzf-{{ fzf_version }}-linux_amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
  when: ansible_facts['os_family'] == 'Debian'

- name: install fzf package (Arch)
  become: true
  package:
    name: fzf
    state: present
  when: ansible_facts['os_family'] == 'Archlinux'
